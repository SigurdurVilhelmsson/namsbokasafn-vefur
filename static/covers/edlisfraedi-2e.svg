<svg xmlns="http://www.w3.org/2000/svg" width="400" height="533" viewBox="0 0 400 533">
  <defs>
    <linearGradient id="bg-edl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a6fb5"/>
      <stop offset="100%" style="stop-color:#2a5490"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="533" fill="url(#bg-edl)"/>

  <!-- Decorative orbital/wave pattern (physics theme) -->
  <g fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2">
    <ellipse cx="80" cy="130" rx="35" ry="15" transform="rotate(-30,80,130)"/>
    <ellipse cx="80" cy="130" rx="35" ry="15" transform="rotate(30,80,130)"/>
    <ellipse cx="80" cy="130" rx="35" ry="15"/>
    <ellipse cx="330" cy="110" rx="25" ry="10" transform="rotate(-45,330,110)"/>
    <ellipse cx="330" cy="110" rx="25" ry="10" transform="rotate(45,330,110)"/>
    <ellipse cx="310" cy="400" rx="28" ry="12" transform="rotate(20,310,400)"/>
    <ellipse cx="60" cy="380" rx="30" ry="12" transform="rotate(-20,60,380)"/>
    <!-- Wave pattern -->
    <path d="M20,460 Q60,445 100,460 Q140,475 180,460 Q220,445 260,460 Q300,475 340,460 Q360,450 380,460"/>
  </g>

  <!-- Atom icon -->
  <g transform="translate(200, 220)">
    <!-- Electron orbits -->
    <ellipse cx="0" cy="0" rx="50" ry="20" fill="none" stroke="white" stroke-width="2.5" transform="rotate(-45)"/>
    <ellipse cx="0" cy="0" rx="50" ry="20" fill="none" stroke="white" stroke-width="2.5" transform="rotate(45)"/>
    <ellipse cx="0" cy="0" rx="50" ry="20" fill="none" stroke="white" stroke-width="2.5"/>
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="10" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="2.5"/>
    <!-- Electrons -->
    <circle cx="50" cy="0" r="4" fill="white"/>
    <circle cx="-25" cy="-35" r="4" fill="white"/>
    <circle cx="-25" cy="35" r="4" fill="white"/>
  </g>

  <!-- Title -->
  <text x="200" y="360" font-family="Georgia, serif" font-size="44" font-weight="bold" fill="white" text-anchor="middle">Eðlisfræði</text>

  <!-- Subtitle -->
  <text x="200" y="400" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.9)" text-anchor="middle">OpenStax College Physics 2e</text>

  <!-- Bottom decoration -->
  <rect x="100" y="440" width="200" height="3" fill="rgba(255,255,255,0.5)"/>
</svg>
