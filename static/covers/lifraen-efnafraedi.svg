<svg xmlns="http://www.w3.org/2000/svg" width="400" height="533" viewBox="0 0 400 533">
  <defs>
    <linearGradient id="bg-lifr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c07a3a"/>
      <stop offset="100%" style="stop-color:#9a5f2a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="533" fill="url(#bg-lifr)"/>

  <!-- Decorative benzene ring pattern (organic chemistry theme) -->
  <g fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2">
    <path d="M60,120 l20,-12 h24 l20,12 l-20,12 h-24 z"/>
    <path d="M68,120 l14,-8 h16 l14,8 l-14,8 h-16 z"/>
    <path d="M310,90 l16,-10 h20 l16,10 l-16,10 h-20 z"/>
    <path d="M316,90 l11,-7 h14 l11,7 l-11,7 h-14 z"/>
    <path d="M300,400 l14,-8 h18 l14,8 l-14,8 h-18 z"/>
    <path d="M50,370 l18,-10 h22 l18,10 l-18,10 h-22 z"/>
    <path d="M56,370 l13,-7 h16 l13,7 l-13,7 h-16 z"/>
  </g>

  <!-- Benzene ring icon -->
  <g transform="translate(160, 175)">
    <path d="M40,0 l35,20 l0,40 l-35,20 l-35,-20 l0,-40 z" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="3"/>
    <path d="M40,10 l25,14 l0,28 l-25,14 l-25,-14 l0,-28 z" fill="none" stroke="white" stroke-width="2"/>
    <!-- Bonds extending from ring -->
    <line x1="40" y1="0" x2="40" y2="-15" stroke="white" stroke-width="2"/>
    <line x1="75" y1="20" x2="88" y2="12" stroke="white" stroke-width="2"/>
    <line x1="75" y1="60" x2="88" y2="68" stroke="white" stroke-width="2"/>
    <line x1="40" y1="80" x2="40" y2="95" stroke="white" stroke-width="2"/>
    <line x1="5" y1="60" x2="-8" y2="68" stroke="white" stroke-width="2"/>
    <line x1="5" y1="20" x2="-8" y2="12" stroke="white" stroke-width="2"/>
  </g>

  <!-- Title -->
  <text x="200" y="355" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">Lífræn</text>
  <text x="200" y="395" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">efnafræði</text>

  <!-- Subtitle -->
  <text x="200" y="435" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.9)" text-anchor="middle">OpenStax Organic Chemistry</text>

  <!-- Bottom decoration -->
  <rect x="100" y="470" width="200" height="3" fill="rgba(255,255,255,0.5)"/>
</svg>
