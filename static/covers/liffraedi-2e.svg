<svg xmlns="http://www.w3.org/2000/svg" width="400" height="533" viewBox="0 0 400 533">
  <defs>
    <linearGradient id="bg-liff" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9e6e"/>
      <stop offset="100%" style="stop-color:#2d7a4f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="533" fill="url(#bg-liff)"/>

  <!-- Decorative leaf/cell pattern (biology theme) -->
  <g fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2">
    <circle cx="80" cy="140" r="35"/>
    <circle cx="80" cy="140" r="18"/>
    <circle cx="320" cy="120" r="28"/>
    <circle cx="320" cy="120" r="12"/>
    <circle cx="340" cy="410" r="22"/>
    <circle cx="60" cy="380" r="30"/>
    <circle cx="60" cy="380" r="14"/>
  </g>

  <!-- DNA helix icon -->
  <g transform="translate(160, 160)">
    <path d="M30,0 Q60,40 30,80 Q0,120 30,160" fill="none" stroke="white" stroke-width="3"/>
    <path d="M50,0 Q20,40 50,80 Q80,120 50,160" fill="none" stroke="white" stroke-width="3"/>
    <line x1="30" y1="20" x2="50" y2="20" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <line x1="35" y1="50" x2="45" y2="50" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <line x1="30" y1="80" x2="50" y2="80" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <line x1="35" y1="110" x2="45" y2="110" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <line x1="30" y1="140" x2="50" y2="140" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  </g>

  <!-- Title -->
  <text x="200" y="380" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">Líffræði</text>

  <!-- Subtitle -->
  <text x="200" y="420" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.9)" text-anchor="middle">OpenStax Biology 2e</text>

  <!-- Bottom decoration -->
  <rect x="100" y="460" width="200" height="3" fill="rgba(255,255,255,0.5)"/>
</svg>
