<svg xmlns="http://www.w3.org/2000/svg" width="400" height="533" viewBox="0 0 400 533">
  <defs>
    <linearGradient id="bg-orv" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366a0"/>
      <stop offset="100%" style="stop-color:#4a4d80"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="533" fill="url(#bg-orv)"/>

  <!-- Decorative microbe pattern -->
  <g fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2">
    <circle cx="70" cy="130" r="25"/>
    <circle cx="70" cy="130" r="8" fill="rgba(255,255,255,0.05)"/>
    <circle cx="330" cy="100" r="20"/>
    <path d="M330,80 Q340,60 350,70" />
    <circle cx="310" cy="420" r="18"/>
    <circle cx="80" cy="370" r="22"/>
    <path d="M80,348 Q90,330 100,340"/>
    <path d="M80,392 Q70,410 60,400"/>
  </g>

  <!-- Microscope icon -->
  <g transform="translate(155, 170)">
    <rect x="35" y="0" width="20" height="60" rx="5" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="3"/>
    <circle cx="45" cy="80" r="25" fill="none" stroke="white" stroke-width="3"/>
    <line x1="45" y1="105" x2="45" y2="140" stroke="white" stroke-width="3"/>
    <line x1="20" y1="140" x2="70" y2="140" stroke="white" stroke-width="3"/>
  </g>

  <!-- Title -->
  <text x="200" y="370" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle">Örverufræði</text>

  <!-- Subtitle -->
  <text x="200" y="410" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.9)" text-anchor="middle">OpenStax Microbiology</text>

  <!-- Bottom decoration -->
  <rect x="100" y="450" width="200" height="3" fill="rgba(255,255,255,0.5)"/>
</svg>
